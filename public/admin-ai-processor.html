<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI YouTube Processor - DUYDODEE</title>

    <!-- External Libraries & Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
        integrity="sha512-iecdLmaskl7CVkqkXNQ/ZH/XLlvWZOJyj7Yy7tcenmpD1ypASozpmT/E0iPtmFIB46ZmdtAc9eNBvH0H/ZpiBw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- Re-using the dashboard stylesheet for consistency -->
    <link rel="stylesheet" href="/css/admin-dashboard.css">
    <style>
        /* Add a spinner for loading state on buttons */
        .btn.loading {
            position: relative;
            color: transparent !important;
            pointer-events: none;
        }
        .btn.loading::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 20px;
            height: 20px;
            margin-top: -10px;
            margin-left: -10px;
            border: 2px solid rgba(255, 255, 255, 0.5);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>

<body>
    <!-- ========================================
       SIDEBAR NAVIGATION
       ======================================== -->
    <aside class="sidebar">
        <div class="sidebar-header">
            <a href="/index.html" class="sidebar-logo">
                <i class="fas fa-play-circle"></i>
                <span>DUYDODEE</span>
            </a>
        </div>
        <div class="sidebar-user">
            <div class="user-info">
                <div id="userAvatar" class="user-avatar">A</div>
                <div class="user-details">
                    <h4 id="userName">Admin User</h4>
                    <p id="userEmail">duy.kan1234@gmail.com</p>
                </div>
            </div>
        </div>
        <nav class="sidebar-nav">
            <div class="nav-section">
                <h3 class="nav-section-title">หลัก</h3>
                <a href="admin-dashboard.html" class="nav-item">
                    <i class="fas fa-th-large"></i>
                    <span>แดชบอด</span>
                </a>
                <a href="admin-ai-processor.html" class="nav-item active">
                    <i class="fas fa-robot"></i>
                    <span>AI Processor</span>
                </a>
            </div>
             <div class="nav-section">
                <h3 class="nav-section-title">จัดการ</h3>
                <a href="#" class="nav-item">
                    <i class="fas fa-film"></i>
                    <span>หนัง</span>
                </a>
                 <a href="#" class="nav-item">
                    <i class="fas fa-users"></i>
                    <span>ผู้ใช้</span>
                </a>
            </div>
            <div class="nav-section">
                <h3 class="nav-section-title">รายงาน</h3>
                <a href="/admin/admin-reports.html" class="nav-item">
                    <i class="fas fa-chart-bar"></i>
                    <span>สถิติ</span>
                </a>
            </div>
        </nav>
    </aside>

    <!-- ========================================
       MAIN CONTENT AREA
       ======================================== -->
    <main class="main-content">
        <header class="top-header">
            <div class="header-left">
                <div class="search-box" role="search">
                    <input type="search" class="search-input" placeholder="ค้นหา...">
                    <i class="fas fa-search search-icon"></i>
                </div>
            </div>
            <div class="header-right">
                <a href="admin-dashboard.html" class="header-btn">
                    <i class="fas fa-arrow-left"></i>
                    <span>กลับแดชบอด</span>
                </a>
            </div>
        </header>

        <div class="dashboard-content">
            <header class="page-header">
                <h1 class="page-title">🤖 AI YouTube Processor</h1>
                <p class="page-subtitle">ดึงข้อมูลจาก YouTube และบันทึกลงฐานข้อมูลโดยอัตโนมัติ</p>
            </header>

            <section class="content-card" aria-labelledby="processor-title">
                 <div id="aiProcessorSection">
                    <div class="ai-processor-container">
                        <div class="ai-input-section">
                            <div class="input-group">
                                <label for="youtubeUrl" class="form-label">ประมวลผล YouTube URL เดี่ยว</label>
                                <div class="input-with-button">
                                    <input type="url" id="youtubeUrl" class="form-input" placeholder="https://www.youtube.com/watch?v=...">
                                    <button id="processSingleBtn" class="btn btn-primary"><i class="fas fa-play"></i><span>Process</span></button>
                                </div>
                            </div>
                            <div class="input-group">
                                <label for="youtubeUrls" class="form-label">ประมวลผลหลาย URL (คั่นด้วยบรรทัดใหม่)</label>
                                <div class="textarea-with-button">
                                    <textarea id="youtubeUrls" class="form-textarea" placeholder="วางหลาย URL ที่นี่..." rows="5"></textarea>
                                    <button id="processBatchBtn" class="btn btn-primary"><i class="fas fa-rocket"></i><span>Process Batch</span></button>
                                </div>
                            </div>
                        </div>
                        <div id="aiResults" class="ai-results" style="display: none;">
                            <h3>ผลลัพธ์การประมวลผล:</h3>
                            <div id="resultsGrid" class="results-grid">
                                <!-- JS will populate results here -->
                            </div>
                        </div>
                    </div>
                </div>
            </section>
        </div>
    </main>
    
    <!-- Loading Overlay (optional, for visual feedback) -->
    <div id="loadingOverlay" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 9999; display: flex; align-items: center; justify-content: center;">
         <div style="text-align: center; color: white;">
            <div style="width: 50px; height: 50px; border: 4px solid rgba(255,255,255,0.3); border-top-color: var(--accent); border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 20px;"></div>
            <p>AI กำลังประมวลผล...</p>
        </div>
    </div>


    <!-- Local Scripts -->
    <script type="module" src="/js/admin-ai-processor.js" defer></script>
</body>
</html>
