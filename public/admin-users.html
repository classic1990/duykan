<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>จัดการผู้ใช้ - DUYDODEE</title>

    <!-- External Libraries & Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Re-using the dashboard stylesheet -->
    <link rel="stylesheet" href="/css/admin-dashboard.css">
    <style>
        /* Re-using theme from dashboard */
        :root {
            --bg-dark: #0f0f0f;
            --bg-card: #1a1a1a;
            --bg-hover: #252525;
            --primary: #e50914;
            --text-main: #ffffff;
            --text-muted: #a3a3a3;
            --border: #333333;
            --success: #46d369;
            --warning: #f9a825;
            --error: #e50914;
            --shadow-card: 0 4px 24px rgba(0,0,0,0.4);
            --radius: 12px;
        }
        body { background-color: var(--bg-dark); color: var(--text-main); font-family: 'Prompt', sans-serif; }
        .sidebar { background: #000000; border-right: 1px solid var(--border); }
        .top-header { background: rgba(15, 15, 15, 0.85); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); padding: 16px 32px; }
        .content-card { background: var(--bg-card); border-radius: var(--radius); border: 1px solid var(--border); box-shadow: var(--shadow-card); overflow: hidden; }
        .card-header { padding: 20px 24px; border-bottom: 1px solid var(--border); }
        .users-table th { background: #151515; color: var(--text-muted); font-weight: 600; text-transform: uppercase; font-size: 0.8rem; padding: 16px 24px; border-bottom: 1px solid var(--border); }
        .users-table td { padding: 12px 24px; border-bottom: 1px solid var(--border); vertical-align: middle; }
        .users-table tr:hover td { background: var(--bg-hover); }
        .user-profile-pic { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; margin-right: 15px; }
        .status-badge { padding: 6px 12px; border-radius: 20px; font-size: 0.8rem; font-weight: 600; }
        .status-badge.active { background: rgba(70, 211, 105, 0.15); color: var(--success); }
        .status-badge.banned { background: rgba(229, 9, 20, 0.15); color: var(--error); }
        .action-btn { width: 32px; height: 32px; border-radius: 6px; display: inline-flex; align-items: center; justify-content: center; transition: all 0.2s; background: transparent; border: 1px solid var(--border); color: var(--text-muted); margin-right: 6px; cursor: pointer; }
        .action-btn:hover { background: var(--bg-hover); color: white; border-color: #666; }
        .action-btn.ban:hover { color: var(--warning); border-color: var(--warning); background: rgba(249, 168, 37, 0.1); }
        .action-btn.unban:hover { color: var(--success); border-color: var(--success); background: rgba(70, 211, 105, 0.1); }
        .action-btn.delete:hover { color: var(--error); border-color: var(--error); background: rgba(229, 9, 20, 0.1); }
        .badge-admin { background: #ffc107; color: #212529; font-size: 0.7rem; padding: 2px 6px; border-radius: 4px; vertical-align: middle; margin-left: 5px; }
    </style>
</head>

<body>
    <!-- ========================================
       SIDEBAR NAVIGATION
       ======================================== -->
    <aside class="sidebar">
        <div class="sidebar-header">
            <a href="/index.html" class="sidebar-logo">
                <i class="fas fa-play-circle"></i>
                <span>DUYDODEE</span>
            </a>
        </div>

        <div class="sidebar-user">
            <div class="user-info">
                <div id="userAvatar" class="user-avatar">A</div>
                <div class="user-details">
                    <h4 id="userName">Admin User</h4>
                    <p id="userEmail">duy.kan1234@gmail.com</p>
                </div>
            </div>
        </div>

        <nav class="sidebar-nav">
            <div class="nav-section">
                <h3 class="nav-section-title">หลัก</h3>
                <a href="/admin-dashboard.html" class="nav-item">
                    <i class="fas fa-th-large"></i>
                    <span>แดชบอด</span>
                </a>
                <a href="admin-ai-processor.html" class="nav-item">
                    <i class="fas fa-robot"></i>
                    <span>AI Processor</span>
                </a>
            </div>

            <div class="nav-section">
                <h3 class="nav-section-title">จัดการ</h3>
                <a href="admin-dashboard.html" class="nav-item">
                    <i class="fas fa-film"></i>
                    <span>หนัง</span>
                </a>
                <a href="admin-users.html" class="nav-item active">
                    <i class="fas fa-users"></i>
                    <span>ผู้ใช้</span>
                </a>
            </div>
        </nav>
        <div class="sidebar-footer">
            <a href="#" id="logoutBtn" class="nav-item logout-btn">
               <i class="fas fa-sign-out-alt"></i>
               <span>ออกจากระบบ</span>
           </a>
       </div>
    </aside>

    <!-- ========================================
       MAIN CONTENT AREA
       ======================================== -->
    <main class="main-content">
        <header class="top-header">
            <div class="header-left">
                <div class="search-box" role="search">
                    <input type="search" class="search-input" placeholder="ค้นหาผู้ใช้ด้วยชื่อหรืออีเมล...">
                    <i class="fas fa-search search-icon"></i>
                </div>
            </div>
            <div class="header-right">
                <button class="header-btn primary">
                    <i class="fas fa-plus"></i>
                    <span>เพิ่มผู้ใช้</span>
                </button>
            </div>
        </header>

        <div class="dashboard-content">
            <header class="page-header">
                <h1 class="page-title">จัดการผู้ใช้งาน</h1>
                <p class="page-subtitle">ตรวจสอบ, ค้นหา, และจัดการผู้ใช้ในระบบ</p>
            </header>
            
            <!-- USERS TABLE SECTION -->
            <section class="content-card" aria-labelledby="users-table-title">
                <header class="card-header">
                    <h2 id="users-table-title" class="card-title">ผู้ใช้ทั้งหมด</h2>
                    <div class="card-actions">
                        <button id="refreshBtn" class="filter-btn"><i class="fas fa-sync-alt"></i><span>รีเฟรช</span></button>
                    </div>
                </header>
                <table class="users-table">
                    <thead>
                        <tr>
                            <th>ผู้ใช้</th>
                            <th>อีเมล</th>
                            <th>เข้าสู่ระบบล่าสุด</th>
                            <th>สถานะ</th>
                            <th>จัดการ</th>
                        </tr>
                    </thead>
                    <tbody id="usersTableBody">
                        <!-- Users will be loaded here by JavaScript -->
                    </tbody>
                </table>
            </section>
        </div>
    </main>

    <!-- ========================================
       SCRIPTS
       ======================================== -->
    <script type="module">
        import { auth } from '/js/firebase-init.js';
        import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const ADMIN_EMAIL = 'duy.kan1234@gmail.com';

        onAuthStateChanged(auth, (user) => {
            if (!user) {
                window.location.href = '/login.html';
            } else if (user.email !== ADMIN_EMAIL) {
                alert('⛔ คุณไม่มีสิทธิ์เข้าถึงส่วนนี้ (สำหรับผู้ดูแลระบบเท่านั้น)');
                window.location.href = '/index.html';
            } else {
                // Update user info in sidebar
                document.getElementById('userName').textContent = user.displayName || user.email;
                document.getElementById('userEmail').textContent = user.email;
                document.getElementById('userAvatar').textContent = (user.displayName || user.email).charAt(0).toUpperCase();
            }
        });

        // Logout handler
        document.getElementById('logoutBtn').addEventListener('click', (e) => {
            e.preventDefault();
            if (confirm('คุณต้องการออกจากระบบใช่หรือไม่?')) {
                signOut(auth).then(() => {
                    window.location.href = '/index.html';
                }).catch(error => {
                    console.error('Logout Error:', error);
                    alert('เกิดข้อผิดพลาดในการออกจากระบบ');
                });
            }
        });
    </script>
    <script type="module" src="/js/admin-users.js"></script>
</body>

</html>
