<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>รายงานปัญหา - DUYDODEE Admin</title>

    <!-- External Libraries & Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
        integrity="sha512-iecdLmaskl7CVkqkXNQ/ZH/XLlvWZOJyj7Yy7tcenmpD1ypASozpmT/E0iPtmFIB46ZmdtAc9eNBvH0H/ZpiBw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- Re-using the dashboard stylesheet -->
    <link rel="stylesheet" href="../css/admin-dashboard.css">
</head>

<body>
    <!-- ========================================
       SIDEBAR NAVIGATION
       ======================================== -->
    <aside class="sidebar">
        <div class="sidebar-header">
            <a href="../index.html" class="sidebar-logo">
                <i class="fas fa-play-circle"></i>
                <span>DUYDODEE</span>
            </a>
        </div>
        <div class="sidebar-user">
            <div class="user-info">
                <div id="userAvatar" class="user-avatar">A</div>
                <div class="user-details">
                    <h4 id="userName">Admin User</h4>
                    <p id="userEmail">duy.kan1234@gmail.com</p>
                </div>
            </div>
        </div>
        <nav class="sidebar-nav">
            <div class="nav-section">
                <h3 class="nav-section-title">หลัก</h3>
                <a href="../admin-dashboard.html" class="nav-item">
                    <i class="fas fa-th-large"></i>
                    <span>แดชบอด</span>
                </a>
                <a href="../admin-ai-processor.html" class="nav-item">
                    <i class="fas fa-robot"></i>
                    <span>AI Processor</span>
                </a>
            </div>
            <div class="nav-section">
                <h3 class="nav-section-title">จัดการ</h3>
                <a href="#" class="nav-item">
                    <i class="fas fa-film"></i>
                    <span>หนัง</span>
                </a>
                <a href="#" class="nav-item">
                    <i class="fas fa-users"></i>
                    <span>ผู้ใช้</span>
                </a>
            </div>
            <div class="nav-section">
                <h3 class="nav-section-title">รายงาน</h3>
                <a href="admin-reports.html" class="nav-item active">
                    <i class="fas fa-chart-bar"></i>
                    <span>รายงานปัญหา</span>
                </a>
            </div>
        </nav>
    </aside>

    <!-- ========================================
       MAIN CONTENT AREA
       ======================================== -->
    <main class="main-content">
        <header class="top-header">
            <div class="header-left">
                <div class="search-box" role="search">
                    <input type="search" id="searchInput" class="search-input" placeholder="ค้นหารายงาน...">
                    <i class="fas fa-search search-icon"></i>
                </div>
            </div>
            <div class="header-right">
                <a href="../admin-dashboard.html" class="header-btn">
                    <i class="fas fa-arrow-left"></i>
                    <span>กลับแดชบอด</span>
                </a>
            </div>
        </header>

        <div class="dashboard-content">
            <header class="page-header">
                <h1 class="page-title">รายการแจ้งไฟล์เสีย</h1>
                <p class="page-subtitle">จัดการรายการที่ผู้ใช้แจ้งปัญหาเข้ามา</p>
            </header>

            <section class="content-card" aria-labelledby="reports-table-title">
                <header class="card-header">
                    <h2 id="reports-table-title" class="card-title">รายงานที่รอดำเนินการ</h2>
                </header>
                <div style="overflow-x: auto;">
                    <table class="movies-table">
                        <thead>
                            <tr>
                                <th>วันที่แจ้ง</th>
                                <th>เรื่อง</th>
                                <th>ตอนที่</th>
                                <th>ปัญหา</th>
                                <th>ผู้แจ้ง</th>
                                <th>สถานะ</th>
                                <th>จัดการ</th>
                            </tr>
                        </thead>
                        <tbody id="reportListBody">
                            <!-- JS will populate this -->
                        </tbody>
                        <tfoot>
                            <tr id="loadingIndicator" style="display: none;">
                                <td colspan="7" style="text-align: center; padding: 40px;">
                                    <div class="loading-spinner" style="border-top-color: var(--accent); width: 30px; height: 30px;"></div>
                                    <p>กำลังโหลดข้อมูล...</p>
                                </td>
                            </tr>
                        </tfoot>
                    </table>
                </div>
            </section>
        </div>
    </main>

    <!-- Local Scripts -->
    <script type="module" src="../js/admin-reports.js" defer></script>
</body>
</html>
