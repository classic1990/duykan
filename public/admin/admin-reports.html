<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>จัดการการแจ้งปัญหา - DUYDODEE</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/assets/css/main.css">
    <link rel="stylesheet" href="/assets/css/toast.css">
    <style>
        body {
            background-color: #141414;
            color: #fff;
            font-family: 'Prompt', sans-serif;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            border-bottom: 1px solid #333;
            padding-bottom: 20px;
        }

        h1 {
            margin: 0;
            color: #e50914;
        }

        .btn {
            padding: 8px 16px;
            border-radius: 4px;
            border: none;
            cursor: pointer;
            font-family: inherit;
            font-weight: 500;
        }

        .btn-back {
            background: #333;
            color: white;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }

        .btn-back:hover {
            background: #444;
        }

        .report-table {
            width: 100%;
            border-collapse: collapse;
            background: #1f1f1f;
            border-radius: 8px;
            overflow: hidden;
        }

        .report-table th,
        .report-table td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid #333;
        }

        .report-table th {
            background: #2a2a2a;
            color: #a0a0a0;
        }

        .status-badge {
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
        }

        .status-pending {
            background: #e50914;
            color: white;
        }

        .status-fixed {
            background: #46d369;
            color: black;
        }

        .btn-fix {
            background: #46d369;
            color: black;
        }

        .btn-fix:hover {
            opacity: 0.9;
        }

        .btn-disabled {
            background: #333;
            color: #666;
            cursor: not-allowed;
        }
    </style>
</head>

<body>
    <div class="container">
        <header>
            <h1><i class="fas fa-tools"></i> รายการแจ้งไฟล์เสีย</h1>
            <input type="text" id="searchInput" placeholder="ค้นหาชื่อเรื่อง, ผู้แจ้ง..."
                style="padding: 8px 15px; border-radius: 4px; border: 1px solid #333; background: #1f1f1f; color: white; width: 300px;">
            <a href="/admin.html" class="btn btn-back"><i class="fas fa-arrow-left"></i> กลับหน้า Admin</a>
        </header>

        <div style="overflow-x: auto;">
            <table class="report-table">
                <thead>
                    <tr>
                        <th>วันที่แจ้ง</th>
                        <th>เรื่อง</th>
                        <th>ตอนที่</th>
                        <th>ปัญหาที่พบ</th>
                        <th>ผู้แจ้ง</th>
                        <th>สถานะ</th>
                        <th>จัดการ</th>
                    </tr>
                </thead>
                <tbody id="reportList">
                    <tr>
                        <td colspan="7" style="text-align:center;">กำลังโหลดข้อมูล...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <div id="toast-container" class="toast-container"></div>

    <script type="module">
        // Firebase SDK imports
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        // Firebase configuration
        const firebaseConfig = {
            apiKey: process.env.FIREBASE_API_KEY || "your-api-key-here",
            authDomain: process.env.FIREBASE_AUTH_DOMAIN || "your-project.firebaseapp.com",
            projectId: process.env.FIREBASE_PROJECT_ID || "your-project-id",
            storageBucket: process.env.FIREBASE_STORAGE_BUCKET || "your-project.appspot.com",
            messagingSenderId: "596308927760",
            appId: "1:596308927760:web:a12be9b2dffb5bc72cb195"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        let allReports = [];

        // Utility functions
        const Utils = {
            showToast(message, type = 'info') {
                const toast = document.createElement('div');
                toast.style.cssText = `
                    position: fixed;
                    top: 20px;
                    right: 20px;
                    padding: 15px 20px;
                    background: ${type === 'error' ? '#e50914' : type === 'success' ? '#46d369' : '#2196f3'};
                    color: white;
                    border-radius: 8px;
                    font-weight: 500;
                    z-index: 10000;
                    transform: translateX(100%);
                    transition: transform 0.3s ease;
                `;
                toast.textContent = message;
                document.body.appendChild(toast);

                setTimeout(() => toast.style.transform = 'translateX(0)', 100);
                setTimeout(() => {
                    toast.style.transform = 'translateX(100%)';
                    setTimeout(() => toast.remove(), 300);
                }, 3000);
            },

            storage: {
                get(key) {
                    try {
                        return JSON.parse(localStorage.getItem(key));
                    } catch {
                        return null;
                    }
                },
                set(key, value) {
                    localStorage.setItem(key, JSON.stringify(value));
                }
            }
        };

        // Check admin access
        function checkAdminAccess() {
            const user = auth.currentUser;
            if (!user) {
                Utils.showToast('กรุณาเข้าสู่ระบบก่อนเข้าใช้งานแอดมิน', 'error');
                setTimeout(() => {
                    window.location.href = '/login.html';
                }, 2000);
                return false;
            }

            if (user.email !== 'duy.kan1234@gmail.com') {
                Utils.showToast('คุณไม่มีสิทธิ์เข้าถึงหน้าแอดมิน', 'error');
                setTimeout(() => {
                    window.location.href = '/index.html';
                }, 2000);
                return false;
            }

            return true;
        }

        async function fetchReports() {
            try {
                const response = await fetch('/api/reports');
                const result = await response.json();

                if (result.success) {
                    allReports = result.reports;
                    renderTable(allReports);
                } else {
                    document.getElementById('reportList').innerHTML = '<tr><td colspan="7" style="text-align:center; color:red;">โหลดข้อมูลไม่สำเร็จ</td></tr>';
                }
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('reportList').innerHTML = '<tr><td colspan="7" style="text-align:center; color:red;">โหลดข้อมูลไม่สำเร็จ</td></tr>';
            }
        }

        document.getElementById('searchInput').addEventListener('keyup', (e) => {
            const term = e.target.value.toLowerCase();
            const filtered = allReports.filter(r =>
                (r.movieTitle && r.movieTitle.toLowerCase().includes(term)) ||
                (r.reportedBy && r.reportedBy.toLowerCase().includes(term)) ||
                (r.reason && r.reason.toLowerCase().includes(term))
            );
            renderTable(filtered);
        });

        function renderTable(reports) {
            const tbody = document.getElementById('reportList');
            if (reports.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;">ไม่มีรายการแจ้งปัญหา</td></tr>';
                return;
            }

            tbody.innerHTML = reports.map(report => `
                <tr>
                    <td>${new Date(report.createdAt).toLocaleDateString('th-TH')} ${new Date(report.createdAt).toLocaleTimeString('th-TH')}</td>
                    <td>${report.movieTitle}</td>
                    <td>${report.episode}</td>
                    <td style="color: #ff9999;">${report.reason}</td>
                    <td>${report.reportedBy}</td>
                    <td><span class="status-badge status-${report.status}">${report.status === 'pending' ? 'รอดำเนินการ' : 'แก้ไขแล้ว'}</span></td>
                    <td>
                        ${report.status === 'pending' ? `
                            <button onclick="markAsFixed('${report.id}')" class="btn btn-success btn-sm">
                                <i class="fas fa-check"></i> แก้ไขแล้ว
                            </button>
                            <button onclick="deleteReport('${report.id}')" class="btn btn-danger btn-sm">
                                <i class="fas fa-trash"></i> ลบ
                            </button>
                        ` : `
                            <button onclick="deleteReport('${report.id}')" class="btn btn-danger btn-sm">
                                <i class="fas fa-trash"></i> ลบ
                            </button>
                        `}
                    </td>
                </tr>
            `).join('');
        }

        async function markAsFixed(id) {
            if (!confirm('ยืนยันว่าได้แก้ไขปัญหานี้แล้ว?')) return;

            try {
                const response = await fetch(`/api/reports/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ status: 'fixed' })
                });
                const result = await response.json();

                if (result.success) {
                    Utils.showToast('อัปเดตสถานะเรียบร้อย', 'success');
                    fetchReports();
                } else {
                    Utils.showToast('อัปเดตสถานะไม่สำเร็จ', 'error');
                }
            } catch (error) {
                console.error('Error:', error);
                Utils.showToast('เกิดข้อผิดพลาด', 'error');
            }
        }

        async function deleteReport(id) {
            if (!confirm('ยืนยันการลบรายการนี้?')) return;

            try {
                const response = await fetch(`/api/reports/${id}`, {
                    method: 'DELETE'
                });
                const result = await response.json();

                if (result.success) {
                    Utils.showToast('ลบรายการเรียบร้อย', 'success');
                    fetchReports();
                } else {
                    Utils.showToast('ลบรายการไม่สำเร็จ', 'error');
                }
            } catch (error) {
                console.error('Error:', error);
                Utils.showToast('เกิดข้อผิดพลาด', 'error');
            }
        }

        // Global functions
        window.markAsFixed = markAsFixed;
        window.deleteReport = deleteReport;

        // Auth state
        onAuthStateChanged(auth, (user) => {
            if (user && user.email === 'duy.kan1234@gmail.com') {
                fetchReports();
            }
        });

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            if (!checkAdminAccess()) {
                return;
            }
            fetchReports();
        });
    </script>
</body>

</html>
